<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{width:1200px;height:630px;background:#1e3a8a;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:"Noto Sans TC",sans-serif;overflow:hidden}
.logo{display:flex;align-items:center;gap:20px;margin-bottom:28px}
.logo-name{color:#fff;font-size:52px;font-weight:900;letter-spacing:2px}
.tagline{color:rgba(255,255,255,.7);font-size:26px;margin-bottom:36px}
.tags{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.tag{background:rgba(255,255,255,.12);color:#fff;font-size:18px;padding:8px 20px;border-radius:99px;border:1px solid rgba(255,255,255,.25)}
.url{color:rgba(255,255,255,.5);font-size:18px;margin-top:36px}
</style>
</head>
<body>
<div class="logo">
  <svg width="80" height="80" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <path d="M22 18L22 52Q22 72 42 72Q62 72 62 52L62 44" fill="none" stroke="#0d9488" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="22" cy="16" r="8" fill="#0d9488"/><circle cx="22" cy="16" r="4" fill="#f0fdfa"/>
    <circle cx="62" cy="42" r="8" fill="#0d9488"/><circle cx="62" cy="42" r="4" fill="#f0fdfa"/>
    <path d="M42 56C42 56 24 72 24 84C24 93 32 100 42 100C52 100 60 93 60 84C60 72 42 56 42 56Z" fill="#1d4ed8" stroke="#60a5fa" stroke-width="2"/>
    <path d="M33 84Q42 76 51 84" fill="none" stroke="#93c5fd" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M36 91Q42 86 48 91" fill="none" stroke="#bfdbfe" stroke-width="2" stroke-linecap="round"/>
  </svg>
  <div class="logo-name">台灣漏水醫生</div>
</div>
<div class="tagline">漏水工班快速媒合平台・全台服務</div>
<div class="tags">
  <div class="tag">浴室漏水</div>
  <div class="tag">頂樓防水</div>
  <div class="tag">外牆滲水</div>
  <div class="tag">壁癌根治</div>
  <div class="tag">管路換新</div>
</div>
<div class="url">leakdoctor.tw</div>
</body>
</html>
