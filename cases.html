<script>
// 從 URL 參數自動篩選
(function(){
  var p=new URLSearchParams(location.search);
  var t=p.get('type'), l=p.get('loc');
  if(t){
    var btn=document.querySelector('.fb-type[data-type="'+t+'"]');
    if(btn){var _fb=document.querySelectorAll('.fb-type');for(var _i=0;_i<_fb.length;_i++)_fb[_i].classList.remove('active');btn.classList.add('active');}
  }
  if(l){
    var btn=document.querySelector('.fb-loc[data-loc="'+l+'"]');
    if(btn){var _fl=document.querySelectorAll('.fb-loc');for(var _j=0;_j<_fl.length;_j++)_fl[_j].classList.remove('active');btn.classList.add('active');}
  }
  if(t||l) setTimeout(applyFilter, 50);
})();

function applyFilter(clickedBtn) {
  // 更新 active 狀態
  if (clickedBtn) {
    if (clickedBtn.classList.contains('fb-type')) {
      var typeBtns = document.querySelectorAll('.fb-type');
      for (var i = 0; i < typeBtns.length; i++) typeBtns[i].classList.remove('active');
      clickedBtn.classList.add('active');
    } else if (clickedBtn.classList.contains('fb-loc')) {
      var locBtns = document.querySelectorAll('.fb-loc');
      for (var i = 0; i < locBtns.length; i++) locBtns[i].classList.remove('active');
      clickedBtn.classList.add('active');
    }
  }
  // 取得目前篩選條件
  var typeActive = document.querySelector('.fb-type.active');
  var locActive  = document.querySelector('.fb-loc.active');
  var curType = typeActive ? typeActive.getAttribute('data-type') : 'all';
  var curLoc  = locActive  ? locActive.getAttribute('data-loc')  : 'all';
  // 套用篩選
  var cards = document.querySelectorAll('.case-card');
  for (var j = 0; j < cards.length; j++) {
    var card = cards[j];
    var matchType = (curType === 'all' || card.getAttribute('data-type') === curType);
    var matchLoc  = (curLoc  === 'all' || card.getAttribute('data-loc')  === curLoc);
    card.style.display = (matchType && matchLoc) ? '' : 'none';
  }
}
// 展開事件由 renderCases 統一處理
window.addEventListener('scroll', function(){
  var hdr = document.querySelector('header');
  if (hdr) hdr.style.boxShadow = window.scrollY > 8 ? '0 2px 16px rgba(0,0,0,.09)' : 'none';
});
</script>

<script>
var TYPE_STYLES = {
  rc:    { bg:'#eff6ff', color:'#1d4ed8', label:'🏢 RC大樓' },
  apt:   { bg:'#fef9c3', color:'#92400e', label:'🏠 老公寓' },
  house: { bg:'#f0fdf4', color:'#16a34a', label:'🏡 透天厝' },
  roof:  { bg:'#fef3c7', color:'#b45309', label:'🏗️ 頂樓加蓋' }
};
var LOC_STYLES = {
  bath:  { cls:'ct-bath',  label:'🚿 浴室漏水' },
  roof:  { cls:'ct-roof',  label:'🏠 頂樓防水' },
  wall:  { cls:'ct-wall',  label:'🪟 外牆滲水' },
  pipe:  { cls:'ct-pipe',  label:'🔧 管路問題' },
  mold:  { cls:'ct-mold',  label:'🟤 壁癌根治' }
};
var RESULT_MAP = {
  pass:    { cls:'r-pass',   icon:'✅', text:'驗收通過' },
  retry:   { cls:'r-retry',  icon:'🔄', text:'二次施工通過' },
  pending: { cls:'r-pending',icon:'⏳', text:'觀察期中' }
};

function renderCases(data) {
  var grid = document.getElementById('cases-grid');
  var statEl = document.querySelector('.stat-num');
  if (statEl) statEl.textContent = data.length;

  var html = '';
  for (var idx = 0; idx < data.length; idx++) {
    var item = data[idx];
    var ts = TYPE_STYLES[item.type] || TYPE_STYLES.rc;
    var ls = LOC_STYLES[item.loc] || LOC_STYLES.bath;
    var rs = RESULT_MAP[item.result] || RESULT_MAP.pass;
    var detail = item.detail || '';
    var detailHtml = detail.split('\n\n').join('<br><br>').split('\n').join('<br>');
    var expandHtml = detail ? (
      '<div class="case-expand" id="exp-' + idx + '">' +
      '<div class="expand-title">師傅施工記錄</div>' +
      '<div class="expand-text">' + detailHtml + '</div>' +
      '</div>'
    ) : '';
    html += '<div class="case-card" data-type="' + item.type + '" data-loc="' + item.loc + '">' +
      '<div class="case-top">' +
        '<div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.4rem">' +
          '<div class="case-type ' + ls.cls + '">' + ls.label + '</div>' +
          '<div class="case-type" style="background:' + ts.bg + ';color:' + ts.color + '">' + ts.label + '</div>' +
        '</div>' +
        '<div class="case-title">' + item.title + '</div>' +
        '<div class="case-loc">📍 ' + item.location + '</div>' +
      '</div>' +
      '<div class="case-body">' +
        '<div class="case-row"><span class="case-lbl">問題</span><span class="case-val">' + item.problem + '</span></div>' +
        '<div class="case-row"><span class="case-lbl">診斷</span><span class="case-val">' + item.diagnosis + '</span></div>' +
        '<div class="case-row"><span class="case-lbl">工法</span><span class="case-val">' + item.method + '</span></div>' +
        '<div class="case-row"><span class="case-lbl">費用</span><span class="case-val">' + item.cost + '</span></div>' +
        '<div class="case-result ' + rs.cls + '">' + rs.icon + ' ' + rs.text + '｜' + item.resultText + '</div>' +
      '</div>' +
      expandHtml +
    '</div>';
  }
  grid.innerHTML = html;

  // 展開/收合
  var cards = document.querySelectorAll('.case-card');
  for (var i = 0; i < cards.length; i++) {
    (function(index) {
      cards[index].addEventListener('click', function() {
        var exp = document.getElementById('exp-' + index);
        if (exp) exp.classList.toggle('open');
      });
    })(i);
  }
  applyFilter();
}
