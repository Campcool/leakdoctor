.case-title{font-weight:700;color:var(--gray-900);font-size:.9rem;line-height:1.4;margin-bottom:.25rem}

/* CTA Strip */

<script>
// 從 URL 參數自動篩選
(function(){
  const p=new URLSearchParams(location.search);
  const t=p.get('type'), l=p.get('loc');
  if(t){
    const btn=document.querySelector('.fb-type[data-type="'+t+'"]');
    if(btn){document.querySelectorAll('.fb-type').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
  }
  if(l){
    const btn=document.querySelector('.fb-loc[data-loc="'+l+'"]');
    if(btn){document.querySelectorAll('.fb-loc').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
  }
  if(t||l) setTimeout(applyFilter, 50);
})();

function applyFilter(){
  const activeType=document.querySelector('.fb-type.active')?.dataset.type||'all';
  const activeLoc=document.querySelector('.fb-loc.active')?.dataset.loc||'all';
  // 更新點擊的按鈕 active 狀態
  if(event && event.target){
    const btn=event.target;
    if(btn.classList.contains('fb-type')){
      document.querySelectorAll('.fb-type').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    } else if(btn.classList.contains('fb-loc')){
      document.querySelectorAll('.fb-loc').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    }
  }
  const curType=document.querySelector('.fb-type.active')?.dataset.type||'all';
  const curLoc=document.querySelector('.fb-loc.active')?.dataset.loc||'all';
  document.querySelectorAll('.case-card').forEach(card=>{
    const matchType = curType==='all' || card.dataset.type===curType;
    const matchLoc  = curLoc==='all'  || card.dataset.loc===curLoc;
    card.style.display = (matchType && matchLoc) ? '' : 'none';
  });
}
// 展開案例詳情
document.querySelectorAll('.case-card').forEach(card=>{
  card.addEventListener('click',function(){
    const expand = this.querySelector('.case-expand');
    expand.classList.toggle('open');
  });
});
window.addEventListener('scroll',()=>{
  document.querySelector('header').style.boxShadow=
    window.scrollY>8?'0 2px 16px rgba(0,0,0,.09)':'none';
});
</script>

<script>
// ── 案例資料從 cases.json 載入 ──
// 新增案例：只需在 cases.json 尾部新增一筆物件即可
// 欄位說明：
//   type: "rc"(RC大樓) | "apt"(老公寓) | "house"(透天厝) | "roof"(頂樓加蓋)
//   loc:  "bath"(浴室) | "roof"(頂樓) | "wall"(外牆) | "pipe"(管路) | "mold"(壁癌)
//   result: "pass"(通過) | "retry"(第二次通過) | "pending"(觀察中)

const TYPE_STYLES = {
  rc:    { bg:'#eff6ff', color:'#1d4ed8', label:'🏢 RC大樓' },
  apt:   { bg:'#fef9c3', color:'#92400e', label:'🏠 老公寓' },
  house: { bg:'#f0fdf4', color:'#16a34a', label:'🏡 透天厝' },
  roof:  { bg:'#fef3c7', color:'#b45309', label:'🏗️ 頂樓加蓋' }
};

const LOC_STYLES = {
  bath:  { cls:'ct-bath',  label:'🚿 浴室漏水' },
  roof:  { cls:'ct-roof',  label:'🏠 頂樓防水' },
  wall:  { cls:'ct-wall',  label:'🪟 外牆滲水' },
  pipe:  { cls:'ct-pipe',  label:'🔧 管路問題' },
  mold:  { cls:'ct-mold',  label:'🟤 壁癌根治' }
};

const RESULT_MAP = {
  pass:    { cls:'r-pass',    icon:'✅', text:'驗收通過' },
  retry:   { cls:'r-retry',   icon:'🔄', text:'二次施工通過' },
  pending: { cls:'r-pending', icon:'⏳', text:'觀察期中' }
};

function renderCases(data) {
  const grid = document.getElementById('cases-grid');
  const statEl = document.querySelector('.stat-num');
  if (statEl) statEl.textContent = data.length;

  grid.innerHTML = data.map((c, idx) => {
    const ts = TYPE_STYLES[c.type] || TYPE_STYLES.rc;
    const ls = LOC_STYLES[c.loc] || LOC_STYLES.bath;
    const rs = RESULT_MAP[c.result] || RESULT_MAP.pass;
    const detailHtml = (c.detail || '').replace(/

/g,'<br><br>').replace(/
/g,'<br>');
    return `
    <div class="case-card" data-type="${c.type}" data-loc="${c.loc}">
      <div class="case-top">
        <div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.4rem">
          <div class="case-type ${ls.cls}">${ls.label}</div>
          <div class="case-type" style="background:${ts.bg};color:${ts.color}">${ts.label}</div>
        </div>
        <div class="case-title">${c.title}</div>
        <div class="case-loc">📍 ${c.location}</div>
      </div>
      <div class="case-body">
        <div class="case-row"><span class="case-lbl">問題</span><span class="case-val">${c.problem}</span></div>
        <div class="case-row"><span class="case-lbl">診斷</span><span class="case-val">${c.diagnosis}</span></div>
        <div class="case-row"><span class="case-lbl">工法</span><span class="case-val">${c.method}</span></div>
        <div class="case-row"><span class="case-lbl">費用</span><span class="case-val">${c.cost}</span></div>
        <div class="case-result ${rs.cls}">${rs.icon} ${rs.text}｜${c.resultText}</div>
      </div>
      ${c.detail ? `
      <div class="case-expand" id="exp-${idx}">
        <div class="expand-title">師傅施工記錄</div>
        <div class="expand-text">${detailHtml}</div>
      </div>` : ''}
    </div>`;
  }).join('
');

  // 重新綁定展開事件
  document.querySelectorAll('.case-card').forEach((card, idx) => {
    card.addEventListener('click', () => {
      const exp = document.getElementById('exp-' + idx);
      if (exp) exp.classList.toggle('open');
    });
  });

  applyFilter();
}

// 載入 cases.json
fetch('cases.json')
  .then(r => r.json())
  .then(data => renderCases(data))
  .catch(() => {
    // 若本機直接開檔案，fetch 無法用時顯示提示
    document.getElementById('cases-grid').innerHTML =
      '<div style="padding:2rem;text-align:center;color:#9ca3af">請透過伺服器開啟（或上傳至 GitHub Pages）才能載入案例資料</div>';
  });
</script>
